version: 2

project_name: observe

before:
  hooks:
    - go mod tidy

builds:
  - id: observe
    main: .
    binary: observe
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
